# Daily public-safety digest for ZIP 20874.
# Runs ~7:15 AM ET (11:15 UTC during EDT; drifts to 8:15 AM during EST — acceptable).
name: Daily Digest

on:
  schedule:
    - cron: "15 11 * * *"
  workflow_dispatch:
    inputs:
      skip_send:
        description: "Skip sending the email (build-only smoke test)"
        required: false
        default: "false"

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  # Opt into Node.js 24 for JS-based actions ahead of the June 2026 default
  # to silence the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch all sources
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: python -m moco_safety fetch --days 365

      # Commit first so the UI gets refreshed data even if the email step below
      # fails (e.g. SMTP secrets not configured yet).
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json data/snapshot.meta.json data/history
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "chore: snapshot $(date -u +%F)"
          # Another commit may have landed between checkout and push
          # (manual pushes, concurrent workflow runs). Rebase our single
          # snapshot commit on top of whatever's there, then try again.
          # Retry a few times before giving up.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt); rebasing on origin"
            git fetch origin ${GITHUB_REF_NAME}
            git rebase origin/${GITHUB_REF_NAME} || {
              echo "rebase failed — aborting"
              git rebase --abort || true
              exit 1
            }
            sleep $((attempt * 2))
          done
          echo "push failed after 4 attempts"
          exit 1

      - name: Build + send digest
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_send != 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python -m moco_safety digest --send

      - name: Open tracking issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Daily digest failing";
            const body = `Run failed: ${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "digest-health",
            });
            if (issues.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["digest-health"],
              });
            }
