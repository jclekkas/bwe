# Publishes the /web UI + latest snapshot to a `gh-pages` branch.
# To serve it:
#   Settings -> Pages -> Source: "Deploy from a branch"
#                      -> Branch: gh-pages / (root)
# This approach succeeds even before Pages is enabled in the repo; once the
# gh-pages branch exists, GitHub often auto-enables Pages against it.
name: Deploy Pages

on:
  push:
    branches: ["**"]
    paths:
      - "web/**"
      - "data/snapshot.json"
      - "config/zip_20874.geojson"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy from the main feature branch to avoid clobbering from other branches.
    if: github.ref == 'refs/heads/claude/local-alert-emails-5tQLN' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r web/* site/
          cp data/snapshot.json site/snapshot.json
          cp config/zip_20874.geojson site/zip_20874.geojson
          # Prevent Jekyll from filtering files that start with underscore.
          touch site/.nojekyll
          # Cache-bust: replace ?v=<static> with ?v=<commit-sha> in index.html
          # so browsers always fetch the matching pair of HTML + JS + CSS.
          SHA="${GITHUB_SHA::12}"
          sed -i -E "s/\?v=[0-9a-f]+/?v=${SHA}/g" site/index.html
          echo "Cache-busted with SHA=${SHA}"
          grep '?v=' site/index.html || echo "(no ?v= found in index.html)"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: ${{ github.sha }}"
